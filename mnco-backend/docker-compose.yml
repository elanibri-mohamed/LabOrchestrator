version: '3.9'

# ── MNCO Local Development Stack ─────────────────────────────────────────────
# Spins up: PostgreSQL + backend Spring Boot app
# EVE-NG runs separately as a VM (use simulation-mode=true for local dev)

services:

  # ── PostgreSQL 15 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mnco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mnco_db
      POSTGRES_USER: mnco_user
      POSTGRES_PASSWORD: mnco_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnco_user -d mnco_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mnco-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mnco_db
      DB_USERNAME: mnco_user
      DB_PASSWORD: mnco_pass
      JWT_SECRET: change-this-in-production-use-a-256bit-random-secret-key!!
      JWT_EXPIRATION_MS: 86400000
      EVENG_BASE_URL: http://192.168.100.10
      EVENG_USERNAME: admin
      EVENG_PASSWORD: eve
      EVENG_SIMULATION: "true"   # Set to false when EVE-NG VM is available
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:
    driver: local
