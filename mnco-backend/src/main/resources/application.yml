spring:
  application:
    name: mnco-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mnco_db}
    username: ${DB_USERNAME:mnco_user}
    password: ${DB_PASSWORD:mnco_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MncoHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  #servlet:
  #  context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}    # 24 hours
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days

# EVE-NG Integration
eveng:
  base-url: ${EVENG_BASE_URL:http://192.168.100.10}
  username: ${EVENG_USERNAME:admin}
  password: ${EVENG_PASSWORD:eve}
  api-path: /api
  connection-timeout-ms: 5000
  read-timeout-ms: 30000
  lab-base-path: /opt/unetlab/labs
  simulation-mode: ${EVENG_SIMULATION:false}

# Resource Quota Defaults
quota:
  default-max-labs: 3
  default-max-cpu: 8
  default-max-ram-gb: 16
  default-max-storage-gb: 50
  lab-idle-timeout-minutes: 120

# Logging
logging:
  level:
    root: INFO
    com.mnco: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mnco-backend.log
    max-size: 50MB
    max-history: 30

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: MNCO Backend
    version: 1.0.0
    description: Multi-Tenant Network & Cybersecurity Lab Orchestrator
